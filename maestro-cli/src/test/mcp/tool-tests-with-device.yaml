# yaml-language-server: $schema=https://raw.githubusercontent.com/steviec/mcp-server-tester/refs/heads/main/src/schemas/tests-schema.json
tools:
  tests:
    - name: "Test take_screenshot"
      tool: "take_screenshot"
      params:
        device_id: "${DEVICE_ID}"
      expect:
        success: true

    - name: "Test inspect_screen"
      tool: "inspect_screen"
      params:
        device_id: "${DEVICE_ID}"
      expect:
        success: true

    - name: "Test run (inline yaml)"
      tool: "run"
      params:
        device_id: "${DEVICE_ID}"
        yaml: |
          appId: com.apple.mobilesafari
          ---
          - launchApp
      expect:
        success: true

    - name: "Test run (files, expect failure - nonexistent file)"
      tool: "run"
      params:
        device_id: "${DEVICE_ID}"
        files: ["nonexistent.yaml"]
      expect:
        success: false
        error:
          contains: "not found"

    - name: "Test run (files with env replacement)"
      tool: "run"
      params:
        device_id: "${DEVICE_ID}"
        files: ["launch_app_with_env_replacement.yaml"]
        env:
          APP_ID: "com.apple.mobilesafari"
      expect:
        success: true

    - name: "Test run (dir mode)"
      tool: "run"
      params:
        device_id: "${DEVICE_ID}"
        dir: "flows_dir"
      expect:
        success: true
        result:
          contains: "total_flows"

    - name: "Test run (dir mode with include_tags)"
      tool: "run"
      params:
        device_id: "${DEVICE_ID}"
        dir: "flows_dir"
        include_tags: ["smoke"]
      expect:
        success: true
        result:
          contains: "launch_safari.yaml"
