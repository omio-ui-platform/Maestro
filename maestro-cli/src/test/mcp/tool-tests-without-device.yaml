# yaml-language-server: $schema=https://raw.githubusercontent.com/steviec/mcp-server-tester/refs/heads/main/src/schemas/tests-schema.json
tools:
  expected_tool_list:
    - list_devices
    - take_screenshot
    - run
    - inspect_screen
    - cheat_sheet
    - list_cloud_devices
    - run_on_cloud
    - get_cloud_run_status

  tests:
    - name: "List available devices"
      tool: "list_devices"
      params: {}
      expect:
        success: true
        result:
          contains: "device"

    - name: "List cloud devices"
      tool: "list_cloud_devices"
      params: {}
      expect:
        success: true
        result:
          contains: "supported_os"

    - name: "Get Maestro cheat sheet (expect API key required)"
      tool: "cheat_sheet"
      params: {}
      expect:
        success: false
        error:
          contains: "MAESTRO_CLOUD_API_KEY"

    - name: "Run on Cloud (expect API key required)"
      tool: "run_on_cloud"
      params:
        app_file: "ignored.apk"
        flows: "ignored.yaml"
      expect:
        success: false
        error:
          contains: "MAESTRO_CLOUD_API_KEY"

    - name: "Get cloud run status (expect API key required)"
      tool: "get_cloud_run_status"
      params:
        upload_id: "deadbeef"
        project_id: "deadbeef"
      expect:
        success: false
        error:
          contains: "MAESTRO_CLOUD_API_KEY"
